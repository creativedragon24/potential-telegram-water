name: GWP Water Cut Checker

on:
  schedule:
    # Every 10 minutes — fast and free now (no ScraperAPI needed)
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-water:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run water check
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.CHAT_ID }}
          DISTRICT:   ${{ secrets.DISTRICT }}
          STREET:     ${{ secrets.STREET }}
        run: python check_water.py

      - name: Save seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
