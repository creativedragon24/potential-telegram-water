name: GWP Water Cut Checker

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-water:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run water check
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python check_water.py

      - name: Save data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f seen.json ]; then git add seen.json; fi
          if [ -f current_alerts.json ]; then git add current_alerts.json; fi
          if [ -f streets_db.json ]; then git add streets_db.json; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update data [skip ci]"
            git push
          fi
